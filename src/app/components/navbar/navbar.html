<div class="navbar navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">
      <i class="bi bi-shield-check"></i> Insurance Management System
    </span>
    <div class="nav-user">
      <span class="text-white me-3" *ngIf="currentUser$ | async as user">
        Welcome, {{ user.username }} ({{ user.role }})
      </span>
      <button class="btn btn-outline-light" (click)="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="container-fluid">
  <div class="row">
    <!-- Sidebar Navigation -->
    <nav class="col-md-2 d-md-block bg-light sidebar">
      <div class="sidebar-sticky">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
              <i class="bi bi-house-door"></i> Dashboard
            </a>
          </li>

          <!-- Client Links -->
          <li class="nav-item">
            <a class="nav-link" routerLink="/clients" routerLinkActive="active">
              <i class="bi bi-people"></i> Clients
            </a>
          </li>
          <li class="nav-item" *ngIf="hasRole('ROLE_ADMIN') || hasRole('ROLE_EMPLOYE')">
            <a class="nav-link" routerLink="/clients/new" routerLinkActive="active">
              <i class="bi bi-person-plus"></i> Add Client
            </a>
          </li>

          <!-- Contract Links -->
          <li class="nav-item">
            <a class="nav-link" routerLink="/contracts" routerLinkActive="active">
              <i class="bi bi-file-earmark-check"></i> Contracts
            </a>
          </li>
          <li class="nav-item" *ngIf="hasRole('ROLE_CLIENT') || hasRole('ROLE_EMPLOYE')">
            <a class="nav-link" routerLink="/contracts/new" routerLinkActive="active">
              <i class="bi bi-file-earmark-plus"></i> New Contract
            </a>
          </li>

          <!-- Payments Links -->
          <li class="nav-item">
            <a class="nav-link" routerLink="/payments" routerLinkActive="active">
              <i class="bi bi-cash-coin"></i> Payments
            </a>
          </li>
          <li class="nav-item" *ngIf="hasRole('ROLE_ADMIN') || hasRole('ROLE_EMPLOYE')">
            <a class="nav-link" routerLink="/payments/new" routerLinkActive="active">
              <i class="bi bi-plus-circle"></i> Add Payment
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="col-md-10 ml-sm-auto px-md-4">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
