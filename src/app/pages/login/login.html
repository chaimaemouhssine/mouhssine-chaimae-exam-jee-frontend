<div class="container mt-5">
  <div class="card p-4 col-md-4 mx-auto shadow">
    <h2 class="text-center mb-4">Login</h2>

    <form (ngSubmit)="login()">

      <div class="mb-3">
        <label>Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required>
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required>
      </div>

      <button class="btn btn-primary w-100">
        Login
      </button>

    </form>
  </div>
</div>
