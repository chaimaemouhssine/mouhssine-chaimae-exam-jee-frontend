<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Insurance Management</h1>
      <p>Login to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div *ngIf="error" class="alert alert-danger alert-dismissible fade show">
        {{ error }}
        <button type="button" class="btn-close" (click)="error = ''"></button>
      </div>

      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input
          type="text"
          class="form-control"
          id="username"
          formControlName="username"
          [class.is-invalid]="submitted && f['username'].errors"
          placeholder="Enter your username"
        />
        <div class="invalid-feedback" *ngIf="submitted && f['username'].errors">
          <div *ngIf="f['username'].errors['required']">Username is required</div>
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          formControlName="password"
          [class.is-invalid]="submitted && f['password'].errors"
          placeholder="Enter your password"
        />
        <div class="invalid-feedback" *ngIf="submitted && f['password'].errors">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100"
        [disabled]="loading"
      >
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <div class="login-footer">
      <p class="text-muted">Demo credentials:</p>
      <p class="text-muted small">
        Client: client / password123<br />
        Employee: employee / password123<br />
        Admin: admin / password123
      </p>
    </div>
  </div>
</div>
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required>
      </div>

      <button class="btn btn-primary w-100">
        Login
      </button>

    </form>
  </div>
</div>
